#@meta {author: "Paul Landes"}
#@meta {desc: "llama default-like objects", date: "2025-02-02"}


# There are 4 different roles that are supported by Llama text models:
#
#   * system: Sets the context in which to interact with the AI model. It
#             typically includes rules, guidelines, or necessary information
#             that help the model respond effectively.
#
#   * user: Represents the human interacting with the model. It includes the
#           inputs, commands, and questions to the model.
#
#   * ipython: A new role introduced in Llama 3.1. Semantically, this role
#              means "tool". This role is used to mark messages with the
#              output of a tool call when sent back to the model from the
#              executor.
#
#   * assistant: Represents the response generated by the AI model based on
#                the context provided in the system, ipython and user
#                prompts.


## Resources
#
lmtask_llama_base_resource:
  class_name: zensols.lmtask.generate.ConfigGeneratorResource
  model_id: ${lmtask_default:base_model_id}
  model_args: 'asdict: lmtask_model_args'
  code_tokenizer: |
    tokenizer.pad_token = '<|finetune_right_pad_id|>'
    if tokenizer.pad_token is None:
      tokenizer.pad_token = tokenizer.eos_token
  code_model: |
    model.config.pad_token_id = self.tokenizer.pad_token_id
    model.generation_config.pad_token_id = self.tokenizer.pad_token_id

lmtask_llama_instruct_resource:
  class_name: ${lmtask_llama_base_resource:class_name}
  model_id: ${lmtask_default:instruct_model_id}
  model_args: ${lmtask_llama_base_resource:model_args}
  code_tokenizer: ${lmtask_llama_base_resource:code_tokenizer}
  code_model: ${lmtask_llama_base_resource:code_model}


## Generators
#
lmtask_llama_base_generator:
  class_name: zensols.lmtask.generate.ReplaceTextGenerator
  resource: 'alias: lmtask_default:base_resource'
  generate_params: >-
    call({'param': {'method': 'asdict'}}): lmtask_model_generate_args
  tokenize_decode_params:
    skip_special_tokens: true
  replacements:
    - ['<\|begin_of_text\|>', '']
    - ['<\|end_of_text\|>', '']

lmtask_llama_instruct_generator:
  class_name: zensols.lmtask.instruct.InstructModelTextGenerator
  resource: 'alias: lmtask_default:instruct_resource'
  generate_params: >-
    call({'param': {'method': 'asdict'}}): lmtask_model_generate_args
  replacements:
    - ['<\|start_header_id\|>.+<\|end_header_id\|>', '']
    - ['<\|eot_id\|>', '']
    - ['<\|begin_of_text\|>', '']
    - ['<\|end_of_text\|>', '']


## Training
#
lmtask_trainer_hf_source_resource:
  class_name: ${lmtask_llama_base_resource:class_name}
  code_tokenizer: ${lmtask_llama_base_resource:code_tokenizer}
  code_model: ${lmtask_llama_base_resource:code_model}

lmtask_trainer_hf_peft:
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
    - lm_head
#    - embed_tokens
